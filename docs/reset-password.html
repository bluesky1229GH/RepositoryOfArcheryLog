<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Archery Log - 重置密码</title>
    <!-- Prevent browser caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-glow.success {
            background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            position: relative;
            animation: fadeIn 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6, #60a5fa, #3b82f6);
            animation: spin 3s linear infinite;
            opacity: 0.6;
        }

        .logo-container.success::before {
            background: conic-gradient(#22c55e, #4ade80, #22c55e);
        }

        .logo-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6, #60a5fa, #3b82f6);
            filter: blur(12px);
            animation: spin 3s linear infinite;
            opacity: 0.3;
        }

        .logo-container.success::after {
            background: conic-gradient(#22c55e, #4ade80, #22c55e);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            border: 3px solid #1a1a1a;
        }

        .icon-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 32px;
            height: 32px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border: 3px solid #0a0a0a;
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s forwards;
        }

        .icon-badge.success {
            background: #22c55e;
        }

        .icon-badge svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes popIn { to { opacity: 1; transform: scale(1); } }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 0.6s ease 1s forwards;
        }

        h1.success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.2s forwards;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeUp 0.6s ease 1.4s forwards;
            text-align: left;
        }

        .form-label {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-input:last-child {
            margin-bottom: 0;
        }

        .password-hint {
            font-size: 0.75rem;
            color: #71717a;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.6s forwards;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit.loading {
            pointer-events: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.3s ease forwards;
        }

        .success-msg {
            color: #22c55e;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spinner 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spinner { to { transform: rotate(360deg); } }

        .app-name {
            font-size: 0.85rem;
            color: #52525b;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.8s forwards;
        }

        .app-name span {
            color: #3b82f6;
            font-weight: 600;
        }

        /* Success state */
        .success-view .check-big {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .success-view .check-big svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #22c55e;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Error state - no token */
        .error-view {
            opacity: 0;
            animation: fadeUp 0.6s ease 0.5s forwards;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: rgba(239, 68, 68, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .error-icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #ef4444;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-glow" id="bg-glow"></div>
    <div class="container">
        <!-- Reset Password Form View -->
        <div id="form-view">
            <div class="logo-container" id="logo-container">
                <img src="logo.jpg" alt="Archery Log" class="logo-img">
                <div class="icon-badge" id="icon-badge">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
            </div>
            <h1 id="title">重置密码</h1>
            <p class="subtitle" id="subtitle">请输入您的新密码</p>

            <div class="form-card">
                <label class="form-label" id="label-new" for="new-password">新密码</label>
                <input type="password" id="new-password" class="form-input" autocomplete="new-password" minlength="6">
                <p class="password-hint" id="password-hint">密码长度至少 6 位</p>
                <label class="form-label" id="label-confirm" for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" class="form-input" autocomplete="new-password" minlength="6">
            </div>

            <button class="btn-submit" id="btn-submit" onclick="handleReset()">
                <span id="btn-text">确认重置</span>
            </button>
            <div id="error-msg" class="error-msg hidden"></div>
        </div>

        <!-- Success View -->
        <div id="success-view" class="success-view hidden">
            <div class="check-big">
                <svg viewBox="0 0 24 24"><polyline points="6,12 10,16 18,8"/></svg>
            </div>
            <h1 class="success" id="success-title">密码重置成功！</h1>
            <p class="subtitle" style="opacity:1" id="success-subtitle">请返回 Archery Log App，<br>使用新密码登录</p>
            <p class="app-name" style="opacity:1">🏹 <span>Archery Log</span></p>
        </div>

        <!-- Error View - invalid/expired link -->
        <div id="error-view" class="error-view hidden">
            <div class="error-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h1 style="background:linear-gradient(135deg,#ef4444,#f87171);-webkit-background-clip:text;background-clip:text" id="error-title">链接无效或已过期</h1>
            <p class="subtitle" style="opacity:1" id="error-subtitle">请返回 App 重新发送密码重置邮件。</p>
            <p class="app-name" style="opacity:1">🏹 <span>Archery Log</span></p>
        </div>
    </div>

    <script>
        // --- Translations ---
        const translations = {
            'en': {
                'page-title': 'Archery Log - Reset Password',
                'title': 'Reset Password',
                'subtitle': 'Enter your new password below',
                'label-new': 'New Password',
                'label-confirm': 'Confirm Password',
                'password-hint': 'At least 6 characters',
                'btn-text': 'Reset Password',
                'btn-loading': 'Resetting...',
                'success-title': 'Password Reset Successfully!',
                'success-subtitle': 'Please return to Archery Log App<br>and log in with your new password.',
                'error-title': 'Invalid or Expired Link',
                'error-subtitle': 'Please return to the App and request a new password reset email.',
                'err-mismatch': 'Passwords do not match.',
                'err-short': 'Password must be at least 6 characters.',
                'err-empty': 'Please fill in both fields.',
                'err-api': 'Reset failed. Please try again.',
            },
            'ja': {
                'page-title': 'Archery Log - パスワードリセット',
                'title': 'パスワードリセット',
                'subtitle': '新しいパスワードを入力してください',
                'label-new': '新しいパスワード',
                'label-confirm': 'パスワード确认',
                'password-hint': '6文字以上',
                'btn-text': 'パスワードをリセット',
                'btn-loading': 'リセット中...',
                'success-title': 'パスワードがリセットされました！',
                'success-subtitle': 'Archery Log アプリに戻り、<br>新しいパスワードでログインしてください。',
                'error-title': 'リンクが無効または期限切れです',
                'error-subtitle': 'アプリに戻り、パスワードリセットメールを再送してください。',
                'err-mismatch': 'パスワードが一致しません。',
                'err-short': 'パスワードは6文字以上必要です。',
                'err-empty': '両方のフィールドを入力してください。',
                'err-api': 'リセットに失敗しました。もう一度お試しください。',
            },
            'zh': {
                'page-title': 'Archery Log - 重置密码',
                'title': '重置密码',
                'subtitle': '请输入您的新密码',
                'label-new': '新密码',
                'label-confirm': '确认密码',
                'password-hint': '密码长度至少 6 位',
                'btn-text': '确认重置',
                'btn-loading': '重置中...',
                'success-title': '密码重置成功！',
                'success-subtitle': '请返回 Archery Log App，<br>使用新密码登录',
                'error-title': '链接无效或已过期',
                'error-subtitle': '请返回 App 重新发送密码重置邮件。',
                'err-mismatch': '两次输入的密码不一致。',
                'err-short': '密码长度至少 6 位。',
                'err-empty': '请填写所有字段。',
                'err-api': '重置失败，请重试。',
            }
        };

        // --- Globals ---
        const SUPABASE_URL = 'https://ydkdrmwkfgmmbfapdjeg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlka2RybXdrZmdtbWJmYXBkamVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDExNjksImV4cCI6MjA5MTgxNzE2OX0.r4ZLPZXJPOpMWIaDxYg6f30jm-7s9mUn1Og3W5RWf0A';

        let currentLang = 'zh';
        let accessToken = null;

        // --- Language Detection ---
        function detectLanguage() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryLang = urlParams.get('lang');
            const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();

            if (queryLang) {
                const clean = queryLang.toLowerCase();
                if (clean.startsWith('zh')) return 'zh';
                if (clean.startsWith('ja')) return 'ja';
                return 'en';
            }
            if (browserLang.startsWith('zh')) return 'zh';
            if (browserLang.startsWith('ja')) return 'ja';
            return 'en';
        }

        function applyTranslations(lang) {
            const t = translations[lang];
            const ids = ['page-title', 'title', 'subtitle', 'label-new', 'label-confirm',
                         'password-hint', 'btn-text', 'success-title', 'error-title'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el && t[id]) el.textContent = t[id];
            });
            // innerHTML for <br> tags
            ['success-subtitle', 'error-subtitle', 'subtitle'].forEach(id => {
                const el = document.getElementById(id);
                if (el && t[id]) el.innerHTML = t[id];
            });
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : (lang === 'ja' ? 'ja' : 'en');
        }

        // --- Token Extraction ---
        function extractToken() {
            const hash = window.location.hash.substring(1);
            if (!hash) return null;

            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            const type = params.get('type');

            if (token && type === 'recovery') {
                return token;
            }
            if (token) {
                return token;
            }
            return null;
        }

        // --- API Call ---
        async function handleReset() {
            const t = translations[currentLang];
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');

            if (!newPw || !confirmPw) {
                showError(t['err-empty']);
                return;
            }
            if (newPw.length < 6) {
                showError(t['err-short']);
                return;
            }
            if (newPw !== confirmPw) {
                showError(t['err-mismatch']);
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');
            btnText.innerHTML = '<span class="spinner"></span>' + t['btn-loading'];
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(SUPABASE_URL + '/auth/v1/user', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify({ password: newPw })
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.msg || data.message || data.error_description || 'API Error');
                }

                showSuccess();

            } catch (e) {
                console.error('Reset failed:', e);
                showError(t['err-api'] + (e.message ? ' (' + e.message + ')' : ''));
                btn.disabled = false;
                btn.classList.remove('loading');
                btnText.textContent = t['btn-text'];
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showSuccess() {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('success-view').classList.remove('hidden');
            document.getElementById('bg-glow').classList.add('success');
        }

        function showInvalidLink() {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('error-view').classList.remove('hidden');
        }

        function init() {
            currentLang = detectLanguage();
            applyTranslations(currentLang);

            accessToken = extractToken();

            if (!accessToken) {
                showInvalidLink();
                return;
            }

            setTimeout(() => {
                document.getElementById('new-password').focus();
            }, 1000);

            document.getElementById('confirm-password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleReset();
            });
            document.getElementById('new-password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('confirm-password').focus();
            });
        }

        init();
    </script>
</body>
</html>
