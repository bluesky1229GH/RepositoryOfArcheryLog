<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archery Log - 邮箱验证成功</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            animation: fadeIn 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(#22c55e, #4ade80, #22c55e);
            animation: spin 3s linear infinite;
            opacity: 0.6;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(#22c55e, #4ade80, #22c55e);
            filter: blur(12px);
            animation: spin 3s linear infinite;
            opacity: 0.3;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            border: 3px solid #1a1a1a;
        }

        /* Checkmark badge */
        .check-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 36px;
            height: 36px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border: 3px solid #0a0a0a;
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s forwards;
        }

        .check-badge svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #000;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.3s forwards;
        }

        .subtitle {
            font-size: 1rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.5s forwards;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeUp 0.6s ease 1.7s forwards;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0;
            font-size: 0.95rem;
            color: #d4d4d8;
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step.done .step-num {
            background: #22c55e;
            color: #000;
        }

        .app-name {
            font-size: 0.85rem;
            color: #52525b;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.9s forwards;
        }

        .app-name span {
            color: #22c55e;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="logo-container">
            <img src="logo.jpg" alt="Archery Log" class="logo-img">
            <div class="check-badge">
                <svg viewBox="0 0 24 24"><polyline points="6,12 10,16 18,8"/></svg>
            </div>
        </div>
        <h1>邮箱验证成功</h1>
        <p class="subtitle">您的邮箱已成功验证，<br>现在可以登录 Archery Log 了</p>

        <div class="card">
            <div class="step done">
                <div class="step-num">✓</div>
                <span>邮箱验证完成</span>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <span>返回 Archery Log App</span>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <span>使用邮箱和密码登录</span>
            </div>
        </div>

        <p class="app-name">🏹 <span>Archery Log</span> · 射箭记录助手</p>
    </div>
</body>
</html>
