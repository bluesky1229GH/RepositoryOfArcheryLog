<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archery Log - 邮箱验证成功</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        /* Checkmark animation */
        .check-circle {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .check-circle svg {
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 3;
        }

        .circle-progress {
            fill: none;
            stroke: #22c55e;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: drawCircle 0.8s ease-out 0.2s forwards;
            filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.4));
        }

        .checkmark {
            fill: none;
            stroke: #22c55e;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.4s ease-out 0.9s forwards;
            filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.5));
        }

        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Target icon */
        .target-icon {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 1.2s forwards;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.3s forwards;
        }

        .subtitle {
            font-size: 1rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.5s forwards;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeUp 0.6s ease 1.7s forwards;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0;
            font-size: 0.95rem;
            color: #d4d4d8;
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step.done .step-num {
            background: #22c55e;
            color: #000;
        }

        .app-name {
            font-size: 0.85rem;
            color: #52525b;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeUp 0.6s ease 1.9s forwards;
        }

        .app-name span {
            color: #22c55e;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="check-circle">
            <svg viewBox="0 0 96 96">
                <circle class="circle-bg" cx="48" cy="48" r="44" />
                <circle class="circle-progress" cx="48" cy="48" r="44" 
                    transform="rotate(-90 48 48)" />
                <polyline class="checkmark" points="30,50 42,62 66,36" />
            </svg>
        </div>

        <div class="target-icon">🎯</div>
        <h1>邮箱验证成功</h1>
        <p class="subtitle">您的邮箱已成功验证，<br>现在可以登录 Archery Log 了</p>

        <div class="card">
            <div class="step done">
                <div class="step-num">✓</div>
                <span>邮箱验证完成</span>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <span>返回 Archery Log App</span>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <span>使用邮箱和密码登录</span>
            </div>
        </div>

        <p class="app-name">🏹 <span>Archery Log</span> · 射箭记录助手</p>
    </div>
</body>
</html>
